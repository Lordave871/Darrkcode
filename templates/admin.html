<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darkcode | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            color: white;
            margin: 0;
            min-height: 100vh;
        }

        .bg-blob {
            position: fixed; width: 600px; height: 600px; filter: blur(120px);
            border-radius: 50%; z-index: -1; opacity: 0.1; animation: float 20s infinite alternate;
        }

        @keyframes float { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .table-row {
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .table-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-active { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-suspended { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }

        .admin-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .admin-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="bg-blob top-0 right-0" style="background: #8b5cf6;"></div>
    <div class="bg-blob bottom-0 left-0" style="background: #3b82f6;"></div>

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white">Admin Console</h1>
                <p class="text-gray-400 text-sm mt-1">Manage users and platform health.</p>
            </div>
            <div class="flex gap-3">
                <a href="{{ url_for('logout') }}" class="admin-btn px-5 py-2.5 rounded-xl bg-red-600/10 text-red-500 border border-red-500/20 text-sm font-semibold hover:bg-red-600 hover:text-white transition-all">
                    <i class="fas fa-sign-out-alt mr-2"></i>Logout
                </a>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="glass-card p-6 rounded-3xl">
                <p class="text-gray-400 text-xs uppercase font-bold tracking-wider mb-1">Database Status</p>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <h2 class="text-2xl font-bold text-emerald-400">Connected</h2>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-8">
            <div class="glass-card rounded-[2.5rem] overflow-hidden">
                <div class="p-8 flex justify-between items-center border-b border-white/5">
                    <h3 class="text-xl font-bold">Live User Directory</h3>
                    <button onclick="loadUsers()" class="text-indigo-400 hover:text-indigo-300 text-sm font-semibold transition-colors">
                        <i class="fas fa-sync-alt mr-2"></i>Refresh Data
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-gray-500 text-[11px] uppercase tracking-widest border-b border-white/5">
                                <th class="px-8 py-4 font-semibold">User Details</th>
                                <th class="px-8 py-4 font-semibold">Account Status</th>
                                <th class="px-8 py-4 font-semibold">Active Course</th>
                                <th class="px-8 py-4 font-semibold text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body">
                            <tr>
                                <td colspan="4" class="px-8 py-10 text-center text-gray-500">
                                    <div class="animate-pulse">Fetching encrypted user data...</div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Load users from Flask API
        async function loadUsers() {
            const tableBody = document.getElementById('user-table-body');
            
            try {
                const response = await fetch('/admin/users');
                const users = await response.json();
                
                tableBody.innerHTML = ''; 

                if (users.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" class="px-8 py-10 text-center text-gray-500">No users found in database.</td></tr>';
                    return;
                }

                users.forEach(user => {
                    const initial = user.name ? user.name.charAt(0).toUpperCase() : 'U';
                    const isActive = user.active === 1; // Backend returns 1 or 0
                    
                    const activeClass = isActive ? 'status-active' : 'status-suspended';
                    const activeText = isActive ? 'Active' : 'Suspended';
                    
                    const toggleIcon = isActive ? 'fa-user-slash' : 'fa-user-check';
                    const toggleTitle = isActive ? 'Suspend User' : 'Activate User';
                    const toggleBtnClass = isActive 
                        ? 'text-amber-500 bg-amber-500/10 hover:bg-amber-500' 
                        : 'text-emerald-500 bg-emerald-500/10 hover:bg-emerald-500';

                    // Safety: Escape single quotes in names to prevent JS breaks
                    const safeName = (user.name || 'Anonymous').replace(/'/g, "\\'");

                    const row = `
                        <tr class="table-row" id="user-row-${user.id}">
                            <td class="px-8 py-5">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center text-sm font-bold text-white">
                                        ${initial}
                                    </div>
                                    <div>
                                        <p class="text-sm font-bold text-white">${user.name || 'Anonymous'}</p>
                                        <p class="text-xs text-gray-500">${user.email}</p>
                                    </div>
                                </div>
                            </td>
                            <td class="px-8 py-5">
                                <span class="status-pill ${activeClass}">${activeText}</span>
                            </td>
                            <td class="px-8 py-5">
                                <div class="flex flex-col">
                                    <span class="text-xs font-semibold text-indigo-400">${user.course || 'None'}</span>
                                    <span class="text-[10px] text-gray-500">Streak: ${user.streak || 0} 🔥</span>
                                </div>
                            </td>
                            <td class="px-8 py-5 text-right">
                                <div class="flex justify-end gap-2">
                                    <button onclick="toggleSuspension(${user.id}, ${user.active})" 
                                            title="${toggleTitle}" 
                                            class="w-9 h-9 flex items-center justify-center rounded-xl ${toggleBtnClass} hover:text-white transition-all shadow-lg shadow-black/20">
                                        <i class="fas ${toggleIcon} text-xs"></i>
                                    </button>
                                    
                                    <button onclick="deleteUser(${user.id}, '${safeName}')" 
                                            title="Delete User" 
                                            class="w-9 h-9 flex items-center justify-center rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all shadow-lg shadow-black/20">
                                        <i class="fas fa-trash-alt text-xs"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                    tableBody.insertAdjacentHTML('beforeend', row);
                });
            } catch (error) {
                console.error("Error loading users:", error);
                tableBody.innerHTML = '<tr><td colspan="4" class="px-8 py-10 text-center text-red-400"><i class="fas fa-exclamation-triangle mr-2"></i>Error connecting to server. Check backend console.</td></tr>';
            }
        }

        // 2. Toggle Suspension via Flask API
        async function toggleSuspension(userId, currentStatus) {
            const action = currentStatus === 1 ? "suspend" : "activate";
            if (!confirm(`Are you sure you want to ${action} this user?`)) return;

            try {
                const response = await fetch(`/admin/toggle-user/${userId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const result = await response.json();

                if (result.status === 'success') {
                    loadUsers(); 
                } else {
                    alert("Error: " + result.message);
                }
            } catch (error) {
                alert("Failed to connect to backend. Is the server running?");
            }
        }

        // 3. Delete user via Flask API
        async function deleteUser(userId, userName) {
            if (!confirm(`WARNING: Are you sure you want to permanently delete ${userName}? This cannot be undone.`)) return;

            try {
                const response = await fetch(`/admin/delete-user/${userId}`, {
                    method: 'DELETE'
                });
                const result = await response.json();

                if (result.status === 'success') {
                    const row = document.getElementById(`user-row-${userId}`);
                    row.style.transform = 'translateX(20px)';
                    row.style.opacity = '0';
                    setTimeout(() => row.remove(), 300);
                } else {
                    alert("Error: " + result.message);
                }
            } catch (error) {
                alert("Failed to connect to backend.");
            }
        }

        // Initial Load
        window.onload = loadUsers;
    </script>
</body>
</html>
