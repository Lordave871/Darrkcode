<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to Darkcode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            display: flex;
            align-items: center;
            justify-content: center; 
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .bg-blob {
            position: absolute; width: 500px; height: 500px; filter: blur(100px);
            border-radius: 50%; z-index: -1; opacity: 0.2; animation: float 15s infinite alternate;
        }

        @keyframes float { from { transform: translate(-10%, -10%); } to { transform: translate(15%, 15%); } }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .spinner {
            display: none;
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .spinner { display: block; }
        .loading .btn-text { display: none; }
        .hidden-form { display: none; }

        /* Icon styling */
        .google-btn:hover i {
            transform: scale(1.1);
            color: #4285F4;
        }
    </style>
</head>
<body class="min-h-screen w-full flex items-center justify-center p-6 relative">

    <div class="bg-blob top-0 left-0" style="background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);"></div>
    <div class="bg-blob bottom-0 right-0" style="background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);"></div>

    <div class="glass-card w-full max-w-md p-10 rounded-[2.5rem] relative z-10">
        <div class="text-center mb-8">
            <h1 id="header-title" class="text-3xl font-bold text-white tracking-tight">Welcome</h1>
            <p class="text-gray-400 text-sm mt-2">Enter your details to continue</p>
        </div>

        <div class="flex bg-white/5 p-1.5 rounded-2xl mb-8">
            <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all bg-white text-black">Login</button>
            <button id="tab-signup" onclick="switchTab('signup')" class="flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all text-gray-400 hover:text-white">Sign Up</button>
        </div>

        <div id="auth-forms">
            <form id="main-form" onsubmit="handleAuth(event)" class="space-y-4">
                <div id="signup-fields" class="hidden-form space-y-4">
                    <input type="text" name="fullName" placeholder="Full Name" class="input-glass w-full px-5 py-4 rounded-2xl focus:outline-none">
                </div>

                <input type="email" name="email" placeholder="Email address" required class="input-glass w-full px-5 py-4 rounded-2xl focus:outline-none">
                
                <div class="space-y-2">
                    <input type="password" id="pass-input" name="password" placeholder="Password" required class="input-glass w-full px-5 py-4 rounded-2xl focus:outline-none">
                    <div id="meter-container" class="hidden-form px-1">
                        <div id="strength-meter" class="h-1 w-0 bg-gray-600 rounded-full transition-all duration-500"></div>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-white text-black py-4 rounded-2xl font-bold hover:bg-gray-200 transition-all flex items-center justify-center gap-2">
                    <span class="spinner"></span>
                    <span class="btn-text" id="btn-label">Sign In</span>
                </button>
            </form>
        </div>

        <div class="mt-8">
            <div class="relative flex items-center mb-6">
                <div class="flex-grow border-t border-white/5"></div>
                <span class="px-4 text-[10px] text-gray-500 uppercase tracking-widest">or continue with</span>
                <div class="flex-grow border-t border-white/5"></div>
            </div>
            
            <button type="button" onclick="googleAuth()" class="google-btn w-full flex items-center justify-center gap-3 py-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 text-white transition-all group">
                <i class="fa-brands fa-google text-xl transition-transform duration-300"></i>
                <span class="font-semibold text-sm">Continue with Google</span>
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDBlTNtJPVlTLPRUy3wPy6FZ5ssHTH6uGE",
            authDomain: "gamex-ac9b6.firebaseapp.com",
            projectId: "gamex-ac9b6"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        let currentMode = 'login';

        function switchTab(mode) {
            currentMode = mode;
            const isLogin = mode === 'login';
            
            document.getElementById('tab-login').className = isLogin ? "flex-1 py-2.5 text-sm font-semibold rounded-xl bg-white text-black" : "flex-1 py-2.5 text-sm font-semibold rounded-xl text-gray-400";
            document.getElementById('tab-signup').className = !isLogin ? "flex-1 py-2.5 text-sm font-semibold rounded-xl bg-white text-black" : "flex-1 py-2.5 text-sm font-semibold rounded-xl text-gray-400";
            
            document.getElementById('signup-fields').classList.toggle('hidden-form', isLogin);
            document.getElementById('meter-container').classList.toggle('hidden-form', isLogin);
            document.getElementById('btn-label').innerText = isLogin ? 'Sign In' : 'Create Account';
            document.getElementById('header-title').innerText = isLogin ? 'Welcome' : 'Join Us';
        }

        async function googleAuth() {
            try {
                const result = await auth.signInWithPopup(googleProvider);
                const idToken = await result.user.getIdToken();

                const response = await fetch('/google-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken: idToken })
                });

                const data = await response.json();
                if (response.ok) {
                    window.location.href = data.redirect;
                } else {
                    alert("Backend Error: " + (data.error || data.message));
                }
            } catch (error) {
                console.error("Google Auth Error:", error);
                if(error.code !== 'auth/popup-closed-by-user') alert("Login failed.");
            }
        }

        async function handleAuth(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());

            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const response = await fetch('/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: currentMode,
                        ...data
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    if (currentMode === 'login') {
                        window.location.href = result.redirect;
                    } else {
                        alert("Account created! Please log in.");
                        switchTab('login');
                    }
                } else {
                    alert("Error: " + result.message);
                }
            } catch (err) {
                console.error("Fetch Error:", err);
                alert("Server connection failed. Make sure your Render service is awake.");
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        document.getElementById('pass-input').oninput = (e) => {
            if (currentMode === 'login') return;
            const val = e.target.value;
            let score = 0;
            if (val.length > 7) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const colors = ['#4b5563', '#ef4444', '#f59e0b', '#10b981'];
            const meter = document.getElementById('strength-meter');
            meter.style.width = (score * 25) + '%';
            meter.style.backgroundColor = colors[score] || colors[0];
        };
    </script>
</body>
</html>
