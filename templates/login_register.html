<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login to Darkcode</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #020617;
    margin: 0;
}

/* blobs */
.bg-blob {
    position: absolute;
    width: 300px;
    height: 300px;
    filter: blur(100px);
    border-radius: 50%;
    z-index: -1;
    opacity: 0.2;
    animation: float 15s infinite alternate;
}

@media (min-width: 768px) {
    .bg-blob {
        width: 500px;
        height: 500px;
    }
}

@keyframes float {
    from { transform: translate(-10%, -10%); }
    to { transform: translate(15%, 15%); }
}

/* card */
.glass-card {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

/* inputs */
.input-glass {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white;
    transition: 0.3s;
}

.input-glass:focus {
    border-color: #6366f1;
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
}

/* loading */
.spinner {
    display: none;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top-color: #fff;
    animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading .spinner { display: block; }
.loading .btn-text { display: none; }

.hidden-form { display: none; }
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 sm:p-6">

<!-- Background blobs -->
<div class="bg-blob top-0 left-0 bg-gradient-to-br from-blue-500 to-purple-600"></div>
<div class="bg-blob bottom-0 right-0 bg-gradient-to-br from-pink-500 to-purple-600"></div>

<!-- Card -->
<div class="glass-card w-full max-w-md p-6 sm:p-8 md:p-10 rounded-3xl shadow-xl">

    <!-- Header -->
    <div class="text-center mb-6 sm:mb-8">
        <h1 id="header-title" class="text-2xl sm:text-3xl font-bold text-white">Welcome</h1>
        <p class="text-gray-400 text-xs sm:text-sm mt-2">Enter your details to continue</p>
    </div>

    <!-- Tabs -->
    <div class="flex bg-white/5 p-1 rounded-xl mb-6">
        <button id="tab-login" onclick="switchTab('login')" 
            class="flex-1 py-2 text-sm font-semibold rounded-lg bg-white text-black">
            Login
        </button>
        <button id="tab-signup" onclick="switchTab('signup')" 
            class="flex-1 py-2 text-sm font-semibold rounded-lg text-gray-400">
            Sign Up
        </button>
    </div>

    <!-- Form -->
    <form id="main-form" onsubmit="handleAuth(event)" class="space-y-4">

        <div id="signup-fields" class="hidden-form">
            <input type="text" name="fullName" placeholder="Full Name"
                class="input-glass w-full px-4 py-3 rounded-xl focus:outline-none">
        </div>

        <input type="email" name="email" placeholder="Email address" required
            class="input-glass w-full px-4 py-3 rounded-xl focus:outline-none">

        <div>
            <input type="password" id="pass-input" name="password" placeholder="Password" required
                class="input-glass w-full px-4 py-3 rounded-xl focus:outline-none">

            <div id="meter-container" class="hidden-form mt-2">
                <div id="strength-meter" class="h-1 w-0 bg-gray-600 rounded-full"></div>
            </div>
        </div>

        <button type="submit" id="submit-btn"
            class="w-full bg-white text-black py-3 rounded-xl font-bold flex items-center justify-center gap-2">
            <span class="spinner"></span>
            <span class="btn-text" id="btn-label">Sign In</span>
        </button>
    </form>

    <!-- Divider -->
    <div class="mt-6">
        <div class="flex items-center mb-4">
            <div class="flex-grow border-t border-white/10"></div>
            <span class="px-3 text-xs text-gray-500">OR</span>
            <div class="flex-grow border-t border-white/10"></div>
        </div>

        <!-- Google -->
        <button onclick="googleAuth()" 
            class="w-full flex items-center justify-center gap-3 py-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 text-white">
            <i class="fa-brands fa-google"></i>
            <span class="text-sm">Continue with Google</span>
        </button>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const googleProvider = new firebase.auth.GoogleAuthProvider();

let currentMode = 'login';

function switchTab(mode) {
    currentMode = mode;
    const isLogin = mode === 'login';

    document.getElementById('tab-login').className =
        isLogin ? "flex-1 py-2 text-sm font-semibold rounded-lg bg-white text-black"
                : "flex-1 py-2 text-sm font-semibold rounded-lg text-gray-400";

    document.getElementById('tab-signup').className =
        !isLogin ? "flex-1 py-2 text-sm font-semibold rounded-lg bg-white text-black"
                 : "flex-1 py-2 text-sm font-semibold rounded-lg text-gray-400";

    document.getElementById('signup-fields').classList.toggle('hidden-form', isLogin);
    document.getElementById('meter-container').classList.toggle('hidden-form', isLogin);

    document.getElementById('btn-label').innerText = isLogin ? 'Sign In' : 'Create Account';
    document.getElementById('header-title').innerText = isLogin ? 'Welcome' : 'Join Us';
}

async function googleAuth() {
    try {
        const result = await auth.signInWithPopup(googleProvider);
        alert("Google login successful");
    } catch (error) {
        alert("Login failed");
    }
}

async function handleAuth(e) {
    e.preventDefault();
    alert("Form submitted");
}

/* Password strength */
document.getElementById('pass-input').oninput = (e) => {
    if (currentMode === 'login') return;

    const val = e.target.value;
    let score = 0;

    if (val.length > 7) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const meter = document.getElementById('strength-meter');
    meter.style.width = (score * 25) + '%';
};
</script>

</body>
</html>
