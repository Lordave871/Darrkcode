<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" type="image/png" href="../static/images/logo.png">
<link rel="apple-touch-icon" href="../static/programming-language/images/logo.png">
<title>Learn Swift — Dark Code</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#041322;--muted:#9fb4af;--accent:#60d1ff;--glass:rgba(255,255,255,0.03);--text:#eafaf6}
  html,body{height:100%;margin:0;font-family:"Exo 2",sans-serif;background:linear-gradient(135deg,#021426,#041322);color:var(--text)}
  .page{max-width:1200px;margin:28px auto;padding:18px;display:grid;grid-template-columns:1fr 360px;gap:18px}
  .hero{grid-column:1/-1;display:flex;justify-content:space-between;padding:18px;border-radius:12px;background:linear-gradient(90deg,rgba(255,255,255,0.02),transparent);border:1px solid var(--glass)}
  .logo{width:64px;height:64px;border-radius:12px;background:linear-gradient(90deg,#60d1ff,#6ecb9f);display:grid;place-items:center;color:#041018;font-weight:800}
  .search{padding:10px;border-radius:10px;border:1px solid var(--glass);background:transparent;color:var(--muted);min-width:240px}
  .topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:12px}
  .option-card{padding:12px;border-radius:10px;background:linear-gradient(180deg,rgba(255,255,255,0.008),transparent);border:1px solid var(--glass);display:flex;flex-direction:column;gap:8px;cursor:default;align-items:center;text-align:center}
  .card-icon{width:64px;height:64px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,#60d1ff,#6ecb9f);color:#fff;font-weight:900;font-size:28px;user-select:none}
  .option-card h3{margin:0;font-size:15px;font-weight:800}
  .option-card p{margin:0;color:var(--muted);font-size:13px}
  .actions{display:flex;gap:8px;justify-content:center;width:100%;margin-top:auto}
  .btn{padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit;cursor:pointer;font-weight:800}
  .btn.primary{background:linear-gradient(90deg,var(--accent),#7fffd4);color:#031018;border:none}
  .notes-panel{background:linear-gradient(180deg,#061018,#041018);padding:12px;border-radius:10px;border:1px solid var(--glass);position:sticky;top:18px;height:calc(100vh - 60px);overflow:auto;display:flex;flex-direction:column;gap:8px}
  .modal-backdrop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:1200;padding:16px}
  .modal{width:100%;max-width:820px;background:linear-gradient(180deg,#071217,#041018);padding:14px;border-radius:12px;border:1px solid var(--glass);color:inherit}
  .progress-wrap { display:inline-block; position:relative; width:52px; height:52px; }
  .progress-inner { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--muted); font-size:12px; pointer-events:none; }
  @media (max-width:1000px){.page{grid-template-columns:1fr} .notes-panel{display:none} body.show-notes .notes-panel{display:flex}}
</style>
</head>
<body>
  <div class="page">
    <header class="hero" role="banner">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="logo" aria-hidden="true">Swift</div>
        <div>
          <div style="font-weight:900;font-size:18px">Swift — Practical Roadmap</div>
          <div style="color:var(--muted);font-size:13px">Language fundamentals, concurrency and app patterns</div>
          <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
            <input id="topic-search" class="search" placeholder="Search topics, keywords..." />
          </div>
          <div class="quick-actions" style="margin-top:8px">
            <button id="swift-banner-back" class="btn" type="button">← Back</button>
            <button id="swift-banner-start" class="btn primary" type="button">Start now</button>
          </div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
        <div style="display:flex;gap:8px">
          <button id="cheat-btn" class="btn primary">Cheat Sheet</button>
          <button id="interview-btn" class="btn">Interview Qs</button>
        </div>

        <div style="margin-top:8px;display:flex;align-items:center;gap:10px">
          <div class="progress-wrap" title="Course progress">
            <svg style="position:absolute;width:0;height:0" aria-hidden="true">
              <defs><linearGradient id="grad-swift" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#60d1ff"/><stop offset="100%" stop-color="#6ecb9f"/></linearGradient></defs>
            </svg>
            <svg viewBox="0 0 52 52" width="52" height="52" class="progress-ring"><circle class="ring-bg" cx="26" cy="26" r="20" stroke="rgba(255,255,255,0.06)" stroke-width="6" fill="none"></circle><circle id="progress-ring-circle" class="ring" cx="26" cy="26" r="20" stroke="url(#grad-swift)" stroke-width="6" stroke-linecap="round" fill="none" stroke-dasharray="0 0" stroke-dashoffset="0"></circle></svg>
            <div class="progress-inner"><span id="progress-text">0%</span></div>
          </div>
          <div style="font-size:13px;color:var(--muted)">Progress</div>
        </div>
      </div>
    </header>

    <main>
      <section>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <h2 style="margin:0">Learning Path</h2>
          <div style="color:var(--muted);font-size:13px">Topics • examples • notes</div>
        </div>

        <div id="topics-grid" class="topics-grid" aria-live="polite"></div>
      </section>
    </main>

    <aside class="notes-panel" id="notes-panel" aria-hidden="false">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h4 style="margin:0">Notes</h4>
        <button id="toggle-notes" class="btn">Toggle</button>
      </div>

      <textarea id="notes-text" style="min-height:120px;padding:10px;border-radius:8px;background:transparent;border:1px solid var(--glass);color:inherit" placeholder="Notes for selected topic..."></textarea>

      <div style="display:flex;gap:8px;margin-top:8px">
        <button id="save-note" class="btn primary">Save Note</button>
        <button id="clear-note" class="btn">Clear</button>
        <button id="clear-all-notes" class="btn">Clear all</button>
      </div>

      <div style="margin-top:12px">
        <div style="font-weight:800;margin-bottom:8px">Topics</div>
        <div id="topic-list" style="display:flex;flex-direction:column;gap:6px;max-height:260px;overflow:auto;padding-right:6px;color:var(--muted);font-size:13px"></div>
      </div>

      <div style="margin-top:12px">
        <div style="font-weight:800;margin-bottom:8px">Saved notes</div>
        <div id="saved-notes-list" style="display:flex;flex-direction:column;gap:8px;color:var(--muted);font-size:13px"></div>
      </div>
    </aside>
  </div>

  <!-- cheat modal -->
  <div id="cheat-modal" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" style="max-width:980px;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
        <h3 style="margin:0">Cheat Sheet</h3>
        <div style="display:flex;gap:8px;align-items:center">
          <button id="cheat-copy" class="btn">Copy</button>
          <button id="cheat-close" class="btn">Close</button>
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-top:12px;align-items:stretch">
        <div id="cheat-topic-list" style="width:36%;max-height:60vh;overflow:auto;padding-right:8px;border-right:1px solid rgba(255,255,255,0.03)"></div>
        <div style="flex:1;min-width:260px">
          <div style="font-weight:800;margin-bottom:8px" id="cheat-title">Select a topic</div>
          <pre id="cheat-pre" style="background:rgba(0,0,0,0.6);padding:12px;border-radius:8px;color:var(--muted);white-space:pre-wrap;overflow:auto;max-height:44vh">// Select a topic to see cheat notes</pre>
          <div id="cheat-examples" style="margin-top:10px;color:var(--muted);font-size:13px"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- interview modal -->
  <div id="interview-modal" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" style="max-width:980px;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
        <h3 style="margin:0">Interview Questions</h3>
        <div style="display:flex;gap:8px;align-items:center">
          <button id="interview-close" class="btn">Close</button>
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-top:12px;align-items:stretch">
        <div id="interview-topic-list" style="width:34%;max-height:60vh;overflow:auto;padding-right:8px;border-right:1px solid rgba(255,255,255,0.03)"></div>
        <div style="flex:1;min-width:260px">
          <div id="interview-title" style="font-weight:800;margin-bottom:8px">Select a topic</div>
          <div id="interview-list" style="max-height:56vh;overflow:auto;color:var(--muted)"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- topic modal -->
  <div id="topic-modal" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 id="modal-title" style="margin:0">Topic</h3>
        <button id="modal-close" class="btn">Close</button>
      </div>
      <pre id="modal-body" style="margin-top:12px;background:rgba(0,0,0,0.6);padding:12px;border-radius:8px;color:var(--muted);white-space:pre-wrap;overflow:auto;max-height:52vh"></pre>
    </div>
  </div>

  <button id="show-notes-btn" class="btn" aria-hidden="true" style="position:fixed;right:18px;z-index:1400;display:none;border-radius:12px;padding:10px 12px;">Show notes</button>

<script src="static/programming-language/rust/main.js"></script>
<script>
(function(){
  // basic modal toggles and wiring for banner buttons
  document.getElementById('cheat-btn')?.addEventListener('click', ()=> { document.getElementById('cheat-modal').style.display='flex'; document.getElementById('cheat-modal').setAttribute('aria-hidden','false'); });
  document.getElementById('cheat-close')?.addEventListener('click', ()=> { document.getElementById('cheat-modal').style.display='none'; document.getElementById('cheat-modal').setAttribute('aria-hidden','true'); });
  document.getElementById('interview-btn')?.addEventListener('click', ()=> { document.getElementById('interview-modal').style.display='flex'; document.getElementById('interview-modal').setAttribute('aria-hidden','false'); });
  document.getElementById('interview-close')?.addEventListener('click', ()=> { document.getElementById('interview-modal').style.display='none'; document.getElementById('interview-modal').setAttribute('aria-hidden','true'); });
  document.getElementById('modal-close')?.addEventListener('click', ()=> { document.getElementById('topic-modal').style.display='none'; document.getElementById('topic-modal').setAttribute('aria-hidden','true'); });

  document.getElementById('topic-search')?.addEventListener('input', (e)=> { window.dispatchEvent(new CustomEvent('swift-search', { detail: e.target.value.trim() })); });

  document.getElementById('swift-banner-back')?.addEventListener('click', (e)=>{ e.preventDefault(); try{ if(history.length>1) history.back(); else location.href='../programmingl_language.html'; }catch(_){} });
  document.getElementById('swift-banner-start')?.addEventListener('click', (e)=>{ e.preventDefault(); try{ const grid = document.getElementById('topics-grid'); if(grid){ grid.scrollIntoView({ behavior: 'smooth', block: 'start' }); setTimeout(()=>{ const first = grid.querySelector('.option-card'); if(first){ try{ first.scrollIntoView({ behavior: 'smooth', block: 'center' }); }catch(_){} try{ first.focus && first.focus(); first.click(); }catch(_){} } }, 350); } }catch(err){ console.warn(err); } });
})();
</script>
</body>
</html>
